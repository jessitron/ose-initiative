<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSE Initiative Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Alegreya:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f4e4c1;
    --parchment-dark: #d4c4a1;
    --ink: #2a1f14;
    --ink-light: #5a4f44;
    --blood: #8b1a1a;
    --blood-glow: #c0392b;
    --heal: #2d6a4f;
    --gold: #b8860b;
    --gold-bright: #daa520;
    --shadow: rgba(42, 31, 20, 0.3);
    --card-bg: rgba(244, 228, 193, 0.85);
    --enemy-tint: rgba(139, 26, 26, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Alegreya', Georgia, serif;
    background: #1a1410;
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(139, 26, 26, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(184, 134, 11, 0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 2px solid var(--gold);
    background: linear-gradient(180deg, rgba(42, 31, 20, 0.95), rgba(26, 20, 16, 0.9));
    position: relative;
  }

  header::after {
    content: '⚔';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1410;
    padding: 0 0.75rem;
    color: var(--gold);
    font-size: 1.2rem;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.6rem;
    color: var(--parchment);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  h1 span { color: var(--gold-bright); }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  /* --- Add Character Form --- */
  .add-form {
    background: var(--card-bg);
    border: 1px solid var(--parchment-dark);
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .add-form h2 {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.75rem;
  }

  .form-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .field label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-light);
    font-weight: 700;
  }

  .field input, .field select {
    font-family: 'Alegreya', serif;
    font-size: 0.95rem;
    padding: 0.4rem 0.5rem;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    background: rgba(255,255,255,0.6);
    color: var(--ink);
  }

  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.2);
  }

  .field.name { flex: 1; min-width: 120px; }
  .field.num input { width: 60px; text-align: center; }

  .btn {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 4px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .btn-add {
    background: var(--ink);
    color: var(--parchment);
  }
  .btn-add:hover { background: var(--ink-light); }

  .btn-roll {
    background: linear-gradient(135deg, var(--gold), var(--gold-bright));
    color: var(--ink);
    font-size: 0.85rem;
    padding: 0.65rem 1.5rem;
    box-shadow: 0 2px 6px rgba(184, 134, 11, 0.3);
  }
  .btn-roll:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(184, 134, 11, 0.4);
  }
  .btn-roll:active { transform: translateY(0); }

  .actions-bar {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .btn-clear {
    background: transparent;
    color: var(--parchment-dark);
    border: 1px solid rgba(212, 196, 161, 0.3);
    font-size: 0.7rem;
    padding: 0.5rem 1rem;
  }
  .btn-clear:hover { border-color: var(--blood); color: var(--blood-glow); }

  /* --- Round display --- */
  .round-display {
    text-align: center;
    margin-bottom: 1rem;
    font-family: 'Cinzel', serif;
    color: var(--parchment-dark);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .round-display.visible { opacity: 1; }

  /* --- Character Cards --- */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .card {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 0.75rem;
    background: var(--card-bg);
    border: 1px solid var(--parchment-dark);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    box-shadow: 0 1px 4px var(--shadow);
    transition: all 0.3s ease, opacity 0.3s;
    position: relative;
  }

  .card.enemy {
    background: linear-gradient(135deg, var(--card-bg), rgba(139, 26, 26, 0.08));
    border-left: 3px solid var(--blood);
  }

  .card.active-turn {
    border-color: var(--gold-bright);
    box-shadow: 0 0 0 2px rgba(218, 165, 32, 0.3), 0 2px 8px var(--shadow);
  }

  .card.dead {
    opacity: 0.4;
    filter: grayscale(0.5);
  }

  .init-badge {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 0.9rem;
    background: var(--ink);
    color: var(--parchment);
    flex-shrink: 0;
  }

  .card.enemy .init-badge {
    background: var(--blood);
  }

  .init-badge.no-init {
    background: var(--parchment-dark);
    color: var(--ink-light);
    font-size: 0.65rem;
  }

  .card-info {
    min-width: 0;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-stats {
    display: flex;
    gap: 0.75rem;
    font-size: 0.8rem;
    color: var(--ink-light);
    margin-top: 0.15rem;
  }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.7;
  }

  .hp-display { font-weight: 700; }
  .hp-display.bloodied { color: var(--blood-glow); }
  .hp-display.dead-text { color: var(--blood); text-decoration: line-through; }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    flex-shrink: 0;
  }

  .hp-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--parchment-dark);
    background: rgba(255,255,255,0.5);
    font-family: 'Alegreya', serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: var(--ink);
    line-height: 1;
  }

  .hp-btn.damage { color: var(--blood); }
  .hp-btn.damage:hover { background: rgba(139, 26, 26, 0.15); border-color: var(--blood); }
  .hp-btn.heal { color: var(--heal); }
  .hp-btn.heal:hover { background: rgba(45, 106, 79, 0.15); border-color: var(--heal); }

  .hp-input {
    width: 36px;
    text-align: center;
    font-family: 'Alegreya', serif;
    font-size: 0.85rem;
    padding: 0.2rem;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    background: rgba(255,255,255,0.5);
    color: var(--ink);
  }
  .hp-input:focus { outline: none; border-color: var(--gold); }

  .remove-btn {
    background: none;
    border: none;
    color: var(--parchment-dark);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.2rem;
    margin-left: 0.25rem;
    opacity: 0.5;
    transition: all 0.15s;
  }
  .remove-btn:hover { opacity: 1; color: var(--blood); }

  /* --- Turn navigation --- */
  .turn-nav {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 1rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .turn-nav.visible { opacity: 1; }

  .btn-turn {
    background: transparent;
    color: var(--parchment);
    border: 1px solid rgba(212, 196, 161, 0.4);
    font-size: 0.7rem;
    padding: 0.4rem 1rem;
  }
  .btn-turn:hover { border-color: var(--gold); color: var(--gold-bright); }

  /* --- Empty State --- */
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--parchment-dark);
    opacity: 0.6;
    font-style: italic;
  }

  .type-toggle {
    display: flex;
    gap: 0;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--parchment-dark);
  }

  .type-toggle button {
    font-family: 'Alegreya', serif;
    font-size: 0.8rem;
    padding: 0.35rem 0.6rem;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.4);
    color: var(--ink-light);
    transition: all 0.15s;
  }

  .type-toggle button.selected {
    background: var(--ink);
    color: var(--parchment);
  }

  .type-toggle button.selected.enemy-sel {
    background: var(--blood);
  }

  @media (max-width: 500px) {
    .form-row { gap: 0.4rem; }
    .field.name { min-width: 100%; }
    .card { grid-template-columns: 30px 1fr auto; gap: 0.5rem; padding: 0.5rem; }
    .init-badge { width: 30px; height: 30px; font-size: 0.8rem; }
  }

  @keyframes flash-damage {
    0% { background-color: rgba(139, 26, 26, 0.2); }
    100% { background-color: transparent; }
  }
  @keyframes flash-heal {
    0% { background-color: rgba(45, 106, 79, 0.2); }
    100% { background-color: transparent; }
  }
  .flash-damage { animation: flash-damage 0.4s ease-out; }
  .flash-heal { animation: flash-heal 0.4s ease-out; }
</style>
</head>
<body>

<header>
  <h1>Initiative <span>Tracker</span></h1>
</header>

<div class="container">
  <div class="add-form">
    <h2>Add Combatant</h2>
    <div class="form-row">
      <div class="field name">
        <label>Name</label>
        <input type="text" id="inp-name" placeholder="Sir Reginald" autocomplete="off">
      </div>
      <div class="field num">
        <label>HP</label>
        <input type="number" id="inp-hp" value="10" min="1">
      </div>
      <div class="field num">
        <label>AC</label>
        <input type="number" id="inp-ac" value="10">
      </div>
      <div class="field num">
        <label>Init +</label>
        <input type="number" id="inp-init" value="0">
      </div>
      <div class="field">
        <label>Type</label>
        <div class="type-toggle">
          <button class="selected" data-type="pc" onclick="setType('pc', this)">PC</button>
          <button data-type="enemy" onclick="setType('enemy', this)">Enemy</button>
        </div>
      </div>
      <button class="btn btn-add" onclick="addCombatant()">Add</button>
    </div>
  </div>

  <div class="actions-bar">
    <button class="btn btn-roll" onclick="rollInitiative()">🎲 Roll Initiative</button>
    <button class="btn btn-clear" onclick="newFight()">New Fight</button>
    <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
  </div>

  <div class="card-list" id="card-list">
    <div class="empty-state">No combatants yet. Add some above!</div>
  </div>

</div>

<script>
  const DEFAULT_PARTY = [
    { name: 'Shekket',   maxHp: 7,  ac: 15, initBonus: 1, type: 'pc' },
    { name: 'Percival',  maxHp: 7,  ac: 15, initBonus: 1, type: 'pc' },
    { name: 'Daisy 🐕',  maxHp: 5,  ac: 10, initBonus: 0, type: 'pc', follows: 'Percival' },
    { name: 'Arriette',  maxHp: 10, ac: 19, initBonus: 2, type: 'pc' },
    { name: 'Salina',    maxHp: 7,  ac: 16, initBonus: 3, type: 'pc' },
    { name: 'Norafina',  maxHp: 8,  ac: 17, initBonus: 2, type: 'pc' },
    { name: 'Chomper 🐕', maxHp: 11, ac: 11, initBonus: 0, type: 'pc', follows: 'Norafina' },
    { name: 'Fayn',      maxHp: 11, ac: 16, initBonus: 2, type: 'pc' },
  ];

  let combatants = [];
  let currentType = 'pc';
  let initiativeRolled = false;
  let currentTurnIndex = -1;
  let round = 1;

  function loadDefaultParty() {
    const partyIds = new Set(combatants.filter(c => c.isDefault).map(c => c.name));
    DEFAULT_PARTY.forEach(def => {
      if (!partyIds.has(def.name)) {
        combatants.push({
          id: Date.now() + Math.random(),
          ...def,
          currentHp: def.maxHp,
          initRoll: null,
          initTotal: null,
          isDefault: true,
        });
      }
    });
    initiativeRolled = false;
    currentTurnIndex = -1;
    round = 1;
    render();
  }

  // Auto-load default party on start
  loadDefaultParty();

  function setType(type, btn) {
    currentType = type;
    document.querySelectorAll('.type-toggle button').forEach(b => {
      b.classList.remove('selected', 'enemy-sel');
    });
    btn.classList.add('selected');
    if (type === 'enemy') btn.classList.add('enemy-sel');
  }

  function addCombatant() {
    const name = document.getElementById('inp-name').value.trim();
    if (!name) { document.getElementById('inp-name').focus(); return; }

    const hp = parseInt(document.getElementById('inp-hp').value) || 10;
    const ac = parseInt(document.getElementById('inp-ac').value) || 10;
    const initBonus = parseInt(document.getElementById('inp-init').value) || 0;

    combatants.push({
      id: Date.now() + Math.random(),
      name,
      maxHp: hp,
      currentHp: hp,
      ac,
      initBonus,
      initRoll: null,
      initTotal: null,
      type: currentType,
    });

    document.getElementById('inp-name').value = '';
    document.getElementById('inp-name').focus();
    render();
  }

  // Allow Enter key to add
  document.getElementById('inp-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCombatant();
  });

  function removeCombatant(id) {
    combatants = combatants.filter(c => c.id !== id);
    if (currentTurnIndex >= combatants.length) currentTurnIndex = combatants.length - 1;
    render();
  }

  function rollInitiative() {
    // First pass: roll for non-followers
    combatants.forEach(c => {
      if (!c.follows) {
        c.initRoll = Math.floor(Math.random() * 20) + 1;
        c.initTotal = c.initRoll + c.initBonus;
      }
    });

    // Second pass: followers copy their owner's roll
    combatants.forEach(c => {
      if (c.follows) {
        const owner = combatants.find(o => o.name === c.follows);
        if (owner) {
          c.initRoll = owner.initRoll;
          c.initTotal = owner.initTotal; // same total, they act together
        } else {
          c.initRoll = Math.floor(Math.random() * 20) + 1;
          c.initTotal = c.initRoll + c.initBonus;
        }
      }
    });

    // Sort: highest total first, ties broken by bonus, then random
    combatants.sort((a, b) => {
      if (b.initTotal !== a.initTotal) return b.initTotal - a.initTotal;
      if (b.initBonus !== a.initBonus) return b.initBonus - a.initBonus;
      return Math.random() - 0.5;
    });

    // Move followers to be right after their owner
    const reordered = [];
    const placed = new Set();
    combatants.forEach(c => {
      if (placed.has(c.id)) return;
      reordered.push(c);
      placed.add(c.id);
      // Find any followers of this combatant
      combatants.forEach(f => {
        if (!placed.has(f.id) && f.follows === c.name) {
          reordered.push(f);
          placed.add(f.id);
        }
      });
    });
    combatants = reordered;

    initiativeRolled = true;
    currentTurnIndex = 0;
    round = 1;
    render();
  }

  function changeHp(id, delta) {
    const c = combatants.find(x => x.id === id);
    if (!c) return;

    // Read custom amount
    const inputEl = document.getElementById('hp-inp-' + id);
    const amount = parseInt(inputEl?.value) || 1;
    const actualDelta = delta > 0 ? amount : -amount;

    c.currentHp = Math.min(c.maxHp, c.currentHp + actualDelta);

    // Flash effect
    const cardEl = document.getElementById('card-' + id);
    if (cardEl) {
      cardEl.classList.remove('flash-damage', 'flash-heal');
      void cardEl.offsetWidth; // reflow
      cardEl.classList.add(actualDelta < 0 ? 'flash-damage' : 'flash-heal');
    }

    render();
  }

  function newFight() {
    // Remove enemies, reset PCs to full HP, clear initiative
    combatants = combatants.filter(c => c.type === 'pc');
    combatants.forEach(c => {
      c.currentHp = c.maxHp;
      c.initRoll = null;
      c.initTotal = null;
    });
    initiativeRolled = false;
    currentTurnIndex = -1;
    round = 1;
    render();
  }

  function clearAll() {
    if (combatants.length > 0 && !confirm('Clear all combatants?')) return;
    combatants = [];
    initiativeRolled = false;
    currentTurnIndex = -1;
    round = 1;
    render();
  }

  function render() {
    const list = document.getElementById('card-list');

    if (combatants.length === 0) {
      list.innerHTML = '<div class="empty-state">No combatants yet. Add some above!</div>';
      return;
    }

    list.innerHTML = combatants.map((c, i) => {
      const isDead = c.currentHp <= 0;
      const isBloodied = c.currentHp <= Math.floor(c.maxHp / 2) && c.currentHp > 0;
      const cardClass = [
        'card',
        c.type === 'enemy' ? 'enemy' : '',
        isDead ? 'dead' : '',
      ].filter(Boolean).join(' ');

      const hpClass = isDead ? 'dead-text' : isBloodied ? 'bloodied' : '';

      const initDisplay = c.initTotal !== null
        ? `<div class="init-badge">${c.initTotal}</div>`
        : `<div class="init-badge no-init">—</div>`;

      const rollDetail = c.follows
        ? `<span><span class="stat-label">w/</span> ${esc(c.follows)}</span>`
        : c.initRoll !== null
          ? `<span><span class="stat-label">Roll</span> ${c.initRoll}${c.initBonus >= 0 ? '+' : ''}${c.initBonus}</span>`
          : `<span><span class="stat-label">Init</span> +${c.initBonus}</span>`;

      return `
        <div class="card ${cardClass}" id="card-${c.id}">
          ${initDisplay}
          <div class="card-info">
            <div class="card-name">${esc(c.name)}</div>
            <div class="card-stats">
              <span><span class="stat-label">HP</span> <span class="hp-display ${hpClass}">${c.currentHp}/${c.maxHp}</span></span>
              <span><span class="stat-label">AC</span> ${c.ac}</span>
              ${rollDetail}
            </div>
          </div>
          <div class="card-actions">
            <button class="hp-btn damage" onclick="changeHp(${c.id}, -1)" title="Damage">−</button>
            <input class="hp-input" id="hp-inp-${c.id}" type="number" value="1" min="1" onclick="this.select()">
            <button class="hp-btn heal" onclick="changeHp(${c.id}, 1)" title="Heal">+</button>
            <button class="remove-btn" onclick="removeCombatant(${c.id})" title="Remove">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  render();
</script>
</body>
</html>
